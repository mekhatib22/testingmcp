# Render deployment configuration for the backend relay server
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: mvp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: BACKEND_AUTH_TOKEN
        sync: false   # set in Render dashboard
      - key: DAEMON_AUTH_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false   # comma-separated frontend URLs
